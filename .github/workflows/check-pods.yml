name: Pod status k8s

on:
  workflow_dispatch:

jobs:
  pod-status:
    runs-on: self-hosted

    env:
      KUBECONFIG: /home/k8s-git-monitor/.kube/config-k8s
    
    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Cleanup old tunnels
        run: |
          pkill -f "ssh.*6443" || true
          sleep 2
    
      - name: Create SSH tunnels
        run: |
          ssh -o StrictHostKeyChecking=no -L 6443:127.0.0.1:6443 k8s-git-monitor@192.168.208.1 -f -N
          sleep 1

      - name: Verify tunnels
        run: ss -tlnp | grep -E '6443|6444'

      - name: List kubectl contexts
        run: kubectl config get-contexts

      - name: Check pod status (k8s)
        run: kubectl get pods -A --context k8s

      - name: Fail if any pods not Ready
        id: check
        run: |
          failed=0
          for ctx in k8s; do
            not_ready=$(kubectl get pods -A --context $ctx --no-headers 2>/dev/null | grep -v "Running\|Completed" | grep -v "^\s*$" || true)
            if [ -n "$not_ready" ]; then
              echo "Pods not Running/Completed in context $ctx:"
              echo "$not_ready"
              failed=1
            fi
          done
          [ $failed -eq 0 ] && echo "All pods Running or Completed in k3s and k8s." || exit 1
