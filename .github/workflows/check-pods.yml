name: Show Pods

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "K3S:"
          
          echo ""
          echo "K8S:"
          ssh -i ~/.ssh/id_rsa k8s-git-monitor@192.168.208.1 "kubectl get pods -A"