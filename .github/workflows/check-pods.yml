name: Show Pods

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub
          
          echo "K3S:"
          
          echo ""
          echo "K8S:"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa.pub k8s-monitor@192.168.203.2 "kubectl get pods -A"